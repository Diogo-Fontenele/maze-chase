<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Maze Chase 🏛️</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #020c14;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }

      /* ── Landscape lock overlay ── */
      #rotate-prompt {
        display: none;
        position: fixed;
        inset: 0;
        background: #020c14;
        z-index: 99999;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        font-family: 'Courier New', monospace;
        color: #7ac8e8;
        text-align: center;
        padding: 24px;
      }
      #rotate-prompt .icon {
        font-size: 64px;
        animation: spin 1.5s ease-in-out infinite alternate;
      }
      #rotate-prompt p { font-size: 16px; letter-spacing: 1px; }
      #rotate-prompt small { color: #446; font-size: 12px; }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(90deg); }
      }

      /* Show rotate prompt only in portrait on narrow screens */
      @media screen and (max-width: 768px) and (orientation: portrait) {
        #rotate-prompt { display: flex !important; }
      }
    </style>
  </head>
  <body>
    <!-- Rotate to landscape prompt -->
    <div id="rotate-prompt">
      <div class="icon">📱</div>
      <p>Gire o dispositivo para<br/><strong style="color:#00c9ff;letter-spacing:3px">MODO PAISAGEM</strong></p>
      <small>Para a melhor experiência no labirinto 3D</small>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
